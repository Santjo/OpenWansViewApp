<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wansview Cloud</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1e;
      --surface: #111827;
      --accent: #00c6ff;
      --accent2: #0072ff;
      --text: #e8edf5;
      --muted: #6b7a99;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: drift 10s ease-in-out infinite alternate;
    }
    .bg-blob.one {
      width: 400px; height: 400px;
      background: var(--accent2);
      top: -100px; left: -100px;
      animation-delay: 0s;
    }
    .bg-blob.two {
      width: 300px; height: 300px;
      background: var(--accent);
      bottom: -80px; right: -80px;
      animation-delay: -4s;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.1); }
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid rgba(0,198,255,0.12);
      border-radius: 24px;
      padding: 52px 48px 44px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 72px; height: 72px;
      margin: 0 auto 28px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px rgba(0,114,255,0.35);
    }

    .icon-wrap svg {
      width: 36px; height: 36px;
      fill: none;
      stroke: #fff;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      border-radius: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      box-shadow: 0 6px 24px rgba(0,114,255,0.4);
    }
    .btn-primary:hover { box-shadow: 0 10px 32px rgba(0,114,255,0.55); transform: translateY(-1px); }

    .btn svg {
      width: 20px; height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .status {
      margin-top: 20px;
      font-size: 0.82rem;
      color: var(--muted);
      min-height: 20px;
      transition: color 0.3s;
    }
    .status.success { color: #34d399; }
    .status.error   { color: #f87171; }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin: 28px 0 20px;
    }

    .footer-note {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="bg-blob one"></div>
  <div class="bg-blob two"></div>

  <div class="card">
    <!-- Camera icon -->
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24">
        <path d="M23 7L16 12L23 17V7Z"/>
        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
      </svg>
    </div>

    <h1>Wansview Cloud</h1>
    <p class="subtitle">Tippe auf den Button, um die App direkt zu öffnen.</p>

    <a class="btn btn-primary" id="openBtn"
       href="intent:#Intent;package=net.ajcloud.wansviewplus;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;end">
      <svg viewBox="0 0 24 24">
        <polyline points="5 12 12 5 19 12"/>
        <line x1="12" y1="5" x2="12" y2="19"/>
      </svg>
      App öffnen
    </a>

    <p class="status" id="status"></p>

    <hr class="divider">
    <p class="footer-note">Funktioniert nur auf Android-Geräten mit installierter Wansview Cloud App.</p>
  </div>

  <script>
    const btn = document.getElementById('openBtn');
    const status = document.getElementById('status');

    btn.addEventListener('click', () => {
      status.className = 'status';
      status.textContent = 'App wird geöffnet…';
      setTimeout(() => {
        status.textContent = 'Falls nichts passiert, stelle sicher dass die App installiert ist.';
      }, 2500);
    });
  </script>

</body>
</html>
